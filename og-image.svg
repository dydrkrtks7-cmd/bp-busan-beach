<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="614" cy="674" r="77" fill="#1a1a2e" opacity="0.14"/>
    <circle cx="956" cy="213" r="46" fill="#1a1a2e" opacity="0.14"/>
    <circle cx="878" cy="78" r="92" fill="#1a1a2e" opacity="0.18"/>
    <circle cx="1234" cy="143" r="39" fill="#1a1a2e" opacity="0.18"/>
    <circle cx="286" cy="224" r="70" fill="#1a1a2e" opacity="0.14"/>
    <circle cx="11" cy="488" r="29" fill="#1a1a2e" opacity="0.12"/>
    <rect x="1089" y="247" width="93" height="77" rx="8" fill="#0a0a0a" opacity="0.14" transform="rotate(43, 750, 678)"/>
    <rect x="608" y="510" width="92" height="68" rx="8" fill="#0a0a0a" opacity="0.09" transform="rotate(26, 543, 328)"/>
    <rect x="216" y="306" width="82" height="21" rx="8" fill="#0a0a0a" opacity="0.07" transform="rotate(29, 7, 21)"/>
    <rect x="272" y="113" width="32" height="72" rx="8" fill="#0a0a0a" opacity="0.11" transform="rotate(39, 1008, 190)"/>
    <rect x="1122" y="458" width="52" height="47" rx="8" fill="#0a0a0a" opacity="0.03" transform="rotate(38, 1169, 585)"/>
    <rect x="1292" y="-7" width="40" height="77" rx="8" fill="#0a0a0a" opacity="0.15" transform="rotate(15, 849, 594)"/>
    <rect x="293" y="58" width="65" height="29" rx="8" fill="#0a0a0a" opacity="0.13" transform="rotate(44, 887, 11)"/>
    <rect x="-63" y="378" width="20" height="89" rx="8" fill="#0a0a0a" opacity="0.11" transform="rotate(2, 280, 711)"/>
    <polygon points="599,447 643,535 555,535" fill="#1a1a2e" opacity="0.05"/>
    <polygon points="1037,-88 1077,-8 997,-8" fill="#1a1a2e" opacity="0.13"/>
    <polygon points="287,602 307,642 267,642" fill="#1a1a2e" opacity="0.08"/>
    <polygon points="1013,-86 1055,-2 971,-2" fill="#1a1a2e" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,584 C360,607 840,561 1200,584 L1200,630 L0,630Z" fill="#1a1a2e" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Busan beach 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Busan — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#7c3aed" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Busan Busan beach 안내 — 정보
  </text>
</svg>